{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block content %}
  <h1>Account</h1>
  <p class="muted">Signed in as <strong>{{ g.user['username'] }}</strong>.</p>

  <h2>Contact details</h2>
  <p class="muted">Used for reservation notifications.</p>
  <form method="post" class="card">
    <input type="hidden" name="action" value="profile">
    <label>Email
      <input type="email" name="email" value="{{ g.user['email'] or '' }}">
    </label>
    <label>Phone
      <input type="tel" name="phone" value="{{ g.user['phone'] or '' }}" placeholder="+15551234567">
    </label>
    <button type="submit">Save</button>
  </form>

  <h2>Change password</h2>
  <form method="post" class="card">
    <input type="hidden" name="action" value="password">
    <label>Current password
      <input type="password" name="current_password" autocomplete="current-password" required>
    </label>
    <label>New password
      <input type="password" name="new_password" autocomplete="new-password" required>
    </label>
    <label>Confirm new password
      <input type="password" name="confirm_password" autocomplete="new-password" required>
    </label>
    <button type="submit">Change password</button>
  </form>
{% endblock %}
