<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- clock face -->
  <circle cx="32" cy="32" r="27" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <!-- 12 / 3 / 6 / 9 tick marks -->
  <g stroke="#2563eb" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="10" x2="32" y2="15"/>
    <line x1="54" y1="32" x2="49" y2="32"/>
    <line x1="32" y1="54" x2="32" y2="49"/>
    <line x1="10" y1="32" x2="15" y2="32"/>
  </g>
  <!-- hands at 10:10 -->
  <g stroke="#1f2733" stroke-linecap="round">
    <line x1="32" y1="32" x2="47.6" y2="23" stroke-width="3"/>
    <line x1="32" y1="32" x2="21.6" y2="26" stroke-width="4"/>
  </g>
  <circle cx="32" cy="32" r="2.6" fill="#1f2733"/>
</svg>
